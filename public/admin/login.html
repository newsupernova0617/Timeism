<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>관리자 로그인 | SyncTime</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2rem;
            color: #1f3c88;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: monospace;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 0.875rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .hint {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
        }

        .hint strong {
            color: #333;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔐 관리자 로그인</h1>
            <p>SyncTime Dashboard</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="adminToken">관리자 토큰</label>
                <input type="password" id="adminToken" name="token" placeholder="토큰을 입력하세요" autocomplete="off"
                    required />
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                로그인
            </button>
        </form>

        <div class="hint">
            <strong>💡 힌트:</strong> 토큰은 <code>.env</code> 파일의 <code>ADMIN_TOKEN</code> 값입니다.
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const tokenInput = document.getElementById('adminToken');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        // 이미 로그인된 경우 대시보드로 리다이렉트
        const savedToken = sessionStorage.getItem('admin_token');
        if (savedToken) {
            window.location.href = `/admin/dashboard?token=${savedToken}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = tokenInput.value.trim();
            if (!token) {
                showError('토큰을 입력해주세요.');
                return;
            }

            // 로딩 상태
            loginBtn.disabled = true;
            loginBtn.textContent = '확인 중...';
            errorMessage.classList.remove('show');

            try {
                // 토큰 검증 (대시보드 접근 시도)
                const response = await fetch(`/admin/dashboard?token=${token}`);

                if (response.ok) {
                    // 토큰 저장 (세션 스토리지)
                    sessionStorage.setItem('admin_token', token);

                    // 대시보드로 리다이렉트
                    window.location.href = `/admin/dashboard?token=${token}`;
                } else {
                    const data = await response.json();
                    showError(data.message || '토큰이 올바르지 않습니다.');
                }
            } catch (err) {
                showError('서버 연결에 실패했습니다.');
                console.error(err);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '로그인';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            tokenInput.focus();
        }

        // Enter 키로 제출
        tokenInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
