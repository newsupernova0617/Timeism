<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1f3c88" rx="20"/>
  
  <!-- Clock face -->
  <circle cx="50" cy="50" r="35" fill="white" stroke="#1f3c88" stroke-width="2"/>
  
  <!-- Hour hand (pointing to 3) -->
  <line x1="50" y1="50" x2="70" y2="50" stroke="#1f3c88" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Minute hand (pointing to 12) -->
  <line x1="50" y1="50" x2="50" y2="25" stroke="#1f3c88" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#1f3c88"/>
  
  <!-- 12, 3, 6, 9 markers -->
  <circle cx="50" cy="20" r="2" fill="#1f3c88"/>
  <circle cx="80" cy="50" r="2" fill="#1f3c88"/>
  <circle cx="50" cy="80" r="2" fill="#1f3c88"/>
  <circle cx="20" cy="50" r="2" fill="#1f3c88"/>
</svg>
